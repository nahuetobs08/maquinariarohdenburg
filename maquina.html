<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Máquina</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card-detalle {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            animation: aparecer 0.5s ease;
        }

      .card-detalle img {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
    background: #f8fafc;
    padding: 15px;
}

        .contenido {
            padding: 20px;
        }

        h1 {
            margin-top: 0;
        }

        p {
            line-height: 1.6;
        }

        .botones {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .wsp {
            background: #25d366;
            color: white;
        }

        .volver {
            background: #3b82f6;
            color: white;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 📱 celular */
        @media (max-width: 600px) {
            .contenido {
                padding: 15px;
            }

            h1 {
                font-size: 20px;
            }

            .btn {
                font-size: 14px;
                padding: 10px;
            }
        }
        
        .media {
    display: flex;
    gap: 20px;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.media img, .media video {
    width: 50%;
    max-height: 400px;
    object-fit: contain;
    background: #f8fafc;
    border-radius: 10px;
}

/* 📱 celular */
@media (max-width: 768px) {
    .media {
        flex-direction: column;
    }

    .media img, .media video {
        width: 100%;
    }
}
    
    </style>

</head>
<body>

<div class="container">
    <div class="card-detalle">
        <div class="media">
    <img id="imagen">
    <video id="video" controls muted>
        <source src="videos/video.mp4" type="video/mp4">
    </video>
</div>

        <div class="contenido">
            <h1 id="nombre"></h1>
            <p id="descripcion"></p>

            <div class="botones">
                <a id="wsp" class="btn wsp" target="_blank">Consultar por WhatsApp</a>
                <a href="Registro.html" class="btn volver">← Volver</a>
            </div>
        </div>
    </div>
</div>

<script>
const maquinas = [
    {
        id:1,
        nombre:"Agitador Orbital",
        desc:"Equipo utilizado para agitar muestras mediante un movimiento circular continuo. Ideal para cultivos, mezclas y procesos que requieren agitación constante.",
        img:"maquina1.jpg"
    },
    {
        id:2,
        nombre:"Centrifuga de Laboratorio",
        desc:"Equipo que separa componentes de una muestra mediante fuerza centrífuga. Utilizado en análisis clínicos, químicos y biológicos.",
        img:"maquina2.jpg"
    },
    {
        id:3,
        nombre:"Plancha Calefactora",
        desc:"Equipo de laboratorio diseñado para calentar muestras de forma uniforme y controlada.",
        img:"maquina3.jpg"
    },
    {
        id:4,
        nombre:"Baño Termostatizado de Laboratorio",
        desc:"Sistema que mantiene agua a temperatura constante para calentar muestras de forma uniforme.",
        img:"maquina4.jpg"
    },
    {
        id:5,
        nombre:"Agitador Vortex",
        desc:"Mezclador de tubos que genera un movimiento tipo remolino para homogenizar muestras rápidamente.",
        img:"maquina5.jpg"
    },
    {
        id:6,
        nombre:"Bomba de Vacio Portatil",
        desc:"Equipo compacto que permite generar vacío para succión de aire o líquidos.",
        img:"maquina6.jpg"
    },
    {
        id:7,
        nombre:"Estufa de Esterilizacion",
        desc:"Equipo que elimina microorganismos mediante calor seco.",
        img:"maquina7.jpg"
    },
    {
        id:8,
        nombre:"Estufa de Cultivo ANACROM",
        desc:"Equipo utilizado para incubar muestras a temperatura controlada.",
        img:"maquina8.jpg"
    },
    {
        id:9,
        nombre:"Controlador de Temperatura",
        desc:"Dispositivo que regula automáticamente la temperatura de un sistema.",
        img:"maquina9.jpg"
    }
];

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get("id"));

const maquina = maquinas.find(m => m.id === id);

if (maquina) {
    document.getElementById("nombre").textContent = maquina.nombre || "Equipo de laboratorio";
    document.getElementById("descripcion").textContent = maquina.desc || "Sin descripción disponible";
    document.getElementById("imagen").src = "img/" + maquina.img;

    const mensaje = encodeURIComponent(`Hola, quiero consultar por ${maquina.nombre || "el equipo"}`);
    document.getElementById("wsp").href = `https://wa.me/5491138567918?text=${mensaje}`;

    const video = document.getElementById("video");

if (maquina.id === 5) {
    video.style.display = "block";
} else {
    video.style.display = "none";
}
}
</script>

</body>
</html>
